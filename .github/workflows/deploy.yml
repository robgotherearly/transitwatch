name: Deploy

on:
  push:
    branches: [main]

jobs:

  build-and-push:
    name: Build + push images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Build and push ingestion image
        uses: docker/build-push-action@v5
        with:
          context: ./ingestion
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/ingestion:latest
            ghcr.io/${{ github.repository }}/ingestion:${{ github.sha }}

      - name: Build and push Airflow image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.airflow
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/airflow:latest
            ghcr.io/${{ github.repository }}/airflow:${{ github.sha }}

  deploy:
    name: Deploy to EC2
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: SSH and deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            cd ~/transitwatch
            git pull origin main
            docker compose up -d --build
            echo "Deploy complete: $(date)"
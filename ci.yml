# .github/workflows/ci.yml
# Runs on every pull request.
# Checks: lint → unit tests → dbt parse (syntax check)
# Full dbt model tests run in Phase 5 when we add a test DB.

name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint-and-test:
    name: Lint + unit tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: transitwatch
          POSTGRES_PASSWORD: transitwatch_test
          POSTGRES_DB: transitwatch_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      POSTGRES_USER: transitwatch
      POSTGRES_PASSWORD: transitwatch_test
      POSTGRES_DB: transitwatch_test
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      GTFS_REALTIME_URL: https://fake-url-for-ci.example.com
      GTFS_FEED_NAME: test_feed

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: ingestion/requirements.txt

      - name: Install dependencies
        run: pip install -r ingestion/requirements.txt

      - name: Lint with flake8
        run: |
          pip install flake8
          flake8 ingestion/ dags/ --max-line-length=100 --exclude=__pycache__

      - name: Initialise test database
        run: |
          PGPASSWORD=transitwatch_test psql \
            -h localhost -U transitwatch -d transitwatch_test \
            -f init_db.sql

      - name: Run unit tests
        run: |
          cd ingestion
          pytest tests/ -v --tb=short

      - name: Install dbt
        run: pip install dbt-postgres==1.8.0

      - name: dbt parse (syntax check — no DB needed)
        run: |
          cd dbt
          dbt parse --profiles-dir . --target dev
        env:
          POSTGRES_HOST: localhost
          POSTGRES_USER: transitwatch
          POSTGRES_PASSWORD: transitwatch_test
          POSTGRES_DB: transitwatch_test

  docker-build:
    name: Docker build check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build ingestion image
        run: docker build -t transitwatch-ingestion:ci ./ingestion

<svg width="100%" viewBox="0 0 680 860" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>TransitWatch architecture diagram</title>
  <desc>End-to-end data engineering pipeline: MTA GTFS API to Python ingestion, PostgreSQL raw layer, Airflow DAG, dbt transformation, PostgreSQL marts, and GitHub Actions CI/CD deploying to AWS EC2.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#378ADD" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      text { font-family: ui-sans-serif, system-ui, sans-serif; fill: #1a1a1a; }
      .th  { font-size: 13px; font-weight: 600; }
      .ts  { font-size: 11px; font-weight: 400; fill: #555; }
      .arr { stroke: #378ADD; stroke-width: 1.5; fill: none; }
      .dash-box { fill: none; stroke: #bbb; stroke-width: 0.5; stroke-dasharray: 5 3; }
      .label { font-size: 11px; fill: #888; }
      /* node colours */
      .n-blue   { fill: #E6F1FB; stroke: #185FA5; stroke-width: 0.5; }
      .n-purple { fill: #EEEDFE; stroke: #534AB7; stroke-width: 0.5; }
      .n-gray   { fill: #F1EFE8; stroke: #5F5E5A; stroke-width: 0.5; }
      .n-coral  { fill: #FAECE7; stroke: #993C1D; stroke-width: 0.5; }
      .n-teal   { fill: #E1F5EE; stroke: #0F6E56; stroke-width: 0.5; }
      .n-amber  { fill: #FAEEDA; stroke: #854F0B; stroke-width: 0.5; }
      .n-green  { fill: #EAF3DE; stroke: #3B6D11; stroke-width: 0.5; }
      .th-blue   { fill: #0C447C; }
      .th-purple { fill: #3C3489; }
      .th-gray   { fill: #444441; }
      .th-coral  { fill: #712B13; }
      .th-teal   { fill: #085041; }
      .th-amber  { fill: #633806; }
      .th-green  { fill: #27500A; }
      .ts-blue   { fill: #185FA5; }
      .ts-purple { fill: #534AB7; }
      .ts-gray   { fill: #5F5E5A; }
      .ts-coral  { fill: #993C1D; }
      .ts-teal   { fill: #0F6E56; }
      .ts-amber  { fill: #854F0B; }
      .ts-green  { fill: #3B6D11; }
    </style>
  </defs>

  <!-- SOURCE -->
  <rect x="200" y="20" width="280" height="52" rx="10" class="n-blue"/>
  <text class="th th-blue" x="340" y="41" text-anchor="middle" dominant-baseline="central">MTA GTFS Realtime API</text>
  <text class="ts ts-blue" x="340" y="59" text-anchor="middle" dominant-baseline="central">9 NYC subway feeds · live trip + vehicle data</text>

  <line x1="340" y1="72" x2="340" y2="100" class="arr" marker-end="url(#arrow)"/>

  <!-- INGESTION -->
  <rect x="160" y="100" width="360" height="52" rx="10" class="n-purple"/>
  <text class="th th-purple" x="340" y="121" text-anchor="middle" dominant-baseline="central">Python ingestion service</text>
  <text class="ts ts-purple" x="340" y="139" text-anchor="middle" dominant-baseline="central">protobuf parsing · retry logic · bulk insert</text>

  <line x1="340" y1="152" x2="340" y2="180" class="arr" marker-end="url(#arrow)"/>

  <!-- RAW LAYER -->
  <rect x="30" y="180" width="620" height="110" rx="12" class="dash-box"/>
  <text class="label" x="50" y="197" dominant-baseline="central">PostgreSQL — raw layer</text>
  <rect x="50"  y="206" width="178" height="68" rx="8" class="n-gray"/>
  <rect x="251" y="206" width="178" height="68" rx="8" class="n-gray"/>
  <rect x="452" y="206" width="178" height="68" rx="8" class="n-gray"/>
  <text class="th th-gray" x="139" y="231" text-anchor="middle" dominant-baseline="central">raw_feed_fetches</text>
  <text class="ts ts-gray" x="139" y="251" text-anchor="middle" dominant-baseline="central">fetch log + status</text>
  <text class="th th-gray" x="340" y="231" text-anchor="middle" dominant-baseline="central">raw_trip_updates</text>
  <text class="ts ts-gray" x="340" y="251" text-anchor="middle" dominant-baseline="central">delay per stop per trip</text>
  <text class="th th-gray" x="541" y="231" text-anchor="middle" dominant-baseline="central">raw_vehicle_positions</text>
  <text class="ts ts-gray" x="541" y="251" text-anchor="middle" dominant-baseline="central">live GPS coordinates</text>

  <line x1="340" y1="290" x2="340" y2="320" class="arr" marker-end="url(#arrow)"/>

  <!-- AIRFLOW -->
  <rect x="30" y="320" width="620" height="160" rx="12" class="dash-box"/>
  <text class="label" x="50" y="337" dominant-baseline="central">Airflow DAG — every 15 minutes</text>
  <rect x="50"  y="348" width="130" height="52" rx="8" class="n-coral"/>
  <rect x="205" y="348" width="130" height="52" rx="8" class="n-coral"/>
  <rect x="360" y="348" width="130" height="52" rx="8" class="n-coral"/>
  <rect x="515" y="348" width="115" height="52" rx="8" class="n-coral"/>
  <text class="th th-coral" x="115" y="368" text-anchor="middle" dominant-baseline="central">ingest_raw</text>
  <text class="ts ts-coral" x="115" y="386" text-anchor="middle" dominant-baseline="central">fetch all feeds</text>
  <text class="th th-coral" x="270" y="368" text-anchor="middle" dominant-baseline="central">run_dbt_models</text>
  <text class="ts ts-coral" x="270" y="386" text-anchor="middle" dominant-baseline="central">transform data</text>
  <text class="th th-coral" x="425" y="368" text-anchor="middle" dominant-baseline="central">run_dbt_tests</text>
  <text class="ts ts-coral" x="425" y="386" text-anchor="middle" dominant-baseline="central">quality checks</text>
  <text class="th th-coral" x="572" y="368" text-anchor="middle" dominant-baseline="central">log_summary</text>
  <text class="ts ts-coral" x="572" y="386" text-anchor="middle" dominant-baseline="central">metrics + alerts</text>
  <line x1="180" y1="374" x2="205" y2="374" class="arr" marker-end="url(#arrow)"/>
  <line x1="335" y1="374" x2="360" y2="374" class="arr" marker-end="url(#arrow)"/>
  <line x1="490" y1="374" x2="515" y2="374" class="arr" marker-end="url(#arrow)"/>
  <rect x="140" y="428" width="380" height="36" rx="8" class="n-coral"/>
  <text class="th th-coral" x="330" y="446" text-anchor="middle" dominant-baseline="central">health_check DAG — daily · freshness + null rate checks</text>

  <line x1="340" y1="480" x2="340" y2="510" class="arr" marker-end="url(#arrow)"/>

  <!-- DBT -->
  <rect x="30" y="510" width="620" height="110" rx="12" class="dash-box"/>
  <text class="label" x="50" y="527" dominant-baseline="central">dbt transformation layer</text>
  <rect x="50"  y="536" width="178" height="68" rx="8" class="n-teal"/>
  <rect x="251" y="536" width="178" height="68" rx="8" class="n-teal"/>
  <rect x="452" y="536" width="178" height="68" rx="8" class="n-teal"/>
  <text class="th th-teal" x="139" y="558" text-anchor="middle" dominant-baseline="central">stg_trip_updates</text>
  <text class="ts ts-teal" x="139" y="576" text-anchor="middle" dominant-baseline="central">dedup · parse · clamp</text>
  <text class="th th-teal" x="340" y="558" text-anchor="middle" dominant-baseline="central">stg_vehicle_positions</text>
  <text class="ts ts-teal" x="340" y="576" text-anchor="middle" dominant-baseline="central">filter · convert · dedup</text>
  <text class="th th-teal" x="541" y="558" text-anchor="middle" dominant-baseline="central">23 dbt tests</text>
  <text class="ts ts-teal" x="541" y="576" text-anchor="middle" dominant-baseline="central">not_null · unique · range</text>

  <line x1="340" y1="620" x2="340" y2="648" class="arr" marker-end="url(#arrow)"/>

  <!-- MARTS -->
  <rect x="30" y="648" width="620" height="110" rx="12" class="dash-box"/>
  <text class="label" x="50" y="665" dominant-baseline="central">PostgreSQL — mart layer (analytics-ready)</text>
  <rect x="50"  y="674" width="178" height="68" rx="8" class="n-amber"/>
  <rect x="251" y="674" width="178" height="68" rx="8" class="n-amber"/>
  <rect x="452" y="674" width="178" height="68" rx="8" class="n-amber"/>
  <text class="th th-amber" x="139" y="696" text-anchor="middle" dominant-baseline="central">mart_route_delays</text>
  <text class="ts ts-amber" x="139" y="714" text-anchor="middle" dominant-baseline="central">RANK · p50 · p95 delays</text>
  <text class="th th-amber" x="340" y="696" text-anchor="middle" dominant-baseline="central">mart_hourly_performance</text>
  <text class="ts ts-amber" x="340" y="714" text-anchor="middle" dominant-baseline="central">LAG · hour-over-hour</text>
  <text class="th th-amber" x="541" y="696" text-anchor="middle" dominant-baseline="central">mart_stop_hotspots</text>
  <text class="ts ts-amber" x="541" y="714" text-anchor="middle" dominant-baseline="central">DENSE_RANK · worst stops</text>

  <line x1="340" y1="758" x2="340" y2="786" class="arr" marker-end="url(#arrow)"/>

  <!-- CI/CD -->
  <rect x="30" y="786" width="620" height="56" rx="12" class="dash-box"/>
  <text class="label" x="50" y="803" dominant-baseline="central">GitHub Actions CI/CD</text>
  <rect x="50"  y="808" width="130" height="28" rx="6" class="n-green"/>
  <rect x="198" y="808" width="130" height="28" rx="6" class="n-green"/>
  <rect x="346" y="808" width="130" height="28" rx="6" class="n-green"/>
  <rect x="494" y="808" width="136" height="28" rx="6" class="n-green"/>
  <text class="ts ts-green" x="115" y="822" text-anchor="middle" dominant-baseline="central">lint + pytest</text>
  <text class="ts ts-green" x="263" y="822" text-anchor="middle" dominant-baseline="central">dbt compile</text>
  <text class="ts ts-green" x="411" y="822" text-anchor="middle" dominant-baseline="central">docker build</text>
  <text class="ts ts-green" x="562" y="822" text-anchor="middle" dominant-baseline="central">deploy → AWS EC2</text>
</svg>

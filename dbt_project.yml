name: 'transitwatch'
version: '1.0.0'
config-version: 2

profile: 'transitwatch'

model-paths: ["models"]
test-paths: ["tests"]
macro-paths: ["macros"]
target-path: "target"
clean-targets: ["target", "dbt_packages"]

models:
  transitwatch:
    staging:
      +materialized: view        # staging = views (cheap, always fresh)
      +schema: staging
    marts:
      +materialized: table       # marts = tables (fast for dashboards)
      +schema: marts

vars:
  # How far back to reprocess on each run (hours)
  lookback_hours: 2

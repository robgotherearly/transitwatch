# docker-compose.yml
# Runs the full TransitWatch stack locally.
# Services: postgres, airflow-init, airflow-webserver,
#           airflow-scheduler, ingestion

version: '3.8'

x-airflow-common: &airflow-common
  image: apache/airflow:2.9.1-python3.11
  env_file: .env
  environment:
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW__CORE__FERNET_KEY}
    AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW__WEBSERVER__SECRET_KEY}
    # Pass app env vars into Airflow so tasks can use them
    POSTGRES_USER: ${POSTGRES_USER}
    POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    POSTGRES_DB: ${POSTGRES_DB}
    POSTGRES_HOST: postgres
    POSTGRES_PORT: 5432
    GTFS_REALTIME_URL: ${GTFS_REALTIME_URL}
    GTFS_FEED_NAME: ${GTFS_FEED_NAME}
    DBT_PROFILES_DIR: /opt/airflow/dbt
  volumes:
    - ./dags:/opt/airflow/dags          # DAGs hot-reload without restart
    - ./dbt:/opt/airflow/dbt            # dbt project mounted into Airflow
    - ./ingestion:/opt/airflow/ingestion
    - airflow_logs:/opt/airflow/logs
    - airflow_plugins:/opt/airflow/plugins
  depends_on:
    postgres:
      condition: service_healthy
  networks:
    - transitwatch

services:

  # ----------------------------------------------------------
  # PostgreSQL — single DB for raw + staging + mart + Airflow
  # ----------------------------------------------------------
  postgres:
    image: postgres:15-alpine
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # init_db.sql runs automatically on first container start
      - ./init_db.sql:/docker-entrypoint-initdb.d/init_db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - transitwatch
    restart: unless-stopped

  # ----------------------------------------------------------
  # Airflow init — runs once to set up DB + create admin user
  # ----------------------------------------------------------
  airflow-init:
    <<: *airflow-common
    command: bash -c "airflow db migrate && airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@transitwatch.local"
    restart: on-failure

  # ----------------------------------------------------------
  # Airflow webserver — UI at http://localhost:8080
  # ----------------------------------------------------------
  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8081:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    restart: unless-stopped

  # ----------------------------------------------------------
  # Airflow scheduler — picks up and runs DAG tasks
  # ----------------------------------------------------------
  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    healthcheck:
      test: ["CMD", "airflow", "jobs", "check", "--job-type", "SchedulerJob"]
      interval: 30s
      timeout: 10s
      retries: 5
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    restart: unless-stopped

  # ----------------------------------------------------------
  # Ingestion service — used for local testing & manual runs
  # In production, Airflow triggers this as a DockerOperator
  # ----------------------------------------------------------
  ingestion:
    build:
      context: ./ingestion
      dockerfile: Dockerfile
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
    volumes:
      - ./ingestion:/app
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - transitwatch
    # Don't auto-start — run manually: docker-compose run ingestion
    profiles:
      - manual

volumes:
  postgres_data:
  airflow_logs:
  airflow_plugins:

networks:
  transitwatch:
    driver: bridge
